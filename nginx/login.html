<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Login</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    overflow: hidden;
  }

  /* Animated gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(220, 50, 47, .12), transparent),
      radial-gradient(ellipse 60% 80% at 80% 20%, rgba(255, 120, 50, .10), transparent),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255, 80, 60, .06), transparent);
    animation: bgShift 12s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0%   { opacity: .6; transform: scale(1); }
    100% { opacity: 1;  transform: scale(1.1); }
  }

  .card {
    position: relative;
    width: 400px;
    padding: 48px 40px 40px;
    background: rgba(18, 18, 24, .85);
    backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 24px;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, .03),
      0 24px 80px rgba(0, 0, 0, .6);
    animation: cardIn .6s cubic-bezier(.16, 1, .3, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(.96); }
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, #dc322f 0%, #ff6b35 100%);
    font-size: 32px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(220, 50, 47, .3);
  }
  .logo h1 {
    color: #f0f0f0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.3px;
  }
  .logo p {
    color: rgba(255, 255, 255, .35);
    font-size: 13px;
    margin-top: 6px;
  }

  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    color: rgba(255, 255, 255, .5);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    background: rgba(255, 255, 255, .05);
    border: 1px solid rgba(255, 255, 255, .08);
    border-radius: 12px;
    color: #f0f0f0;
    font-size: 15px;
    outline: none;
    transition: all .2s;
  }
  .field input:focus {
    border-color: rgba(220, 50, 47, .5);
    background: rgba(255, 255, 255, .07);
    box-shadow: 0 0 0 3px rgba(220, 50, 47, .1);
  }
  .field input::placeholder {
    color: rgba(255, 255, 255, .2);
  }

  .btn {
    width: 100%;
    height: 48px;
    margin-top: 8px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #dc322f 0%, #e8553a 100%);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(220, 50, 47, .35);
  }
  .btn:active:not(:disabled) {
    transform: translateY(0);
  }
  .btn:disabled {
    opacity: .7;
    cursor: not-allowed;
  }

  .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  .btn.loading .btn-text { visibility: hidden; }
  .btn.loading .spinner {
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    margin: -10px 0 0 -10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(220, 50, 47, .1);
    border: 1px solid rgba(220, 50, 47, .2);
    border-radius: 10px;
    color: #ff6b6b;
    font-size: 13px;
    text-align: center;
    display: none;
    animation: shake .4s ease-in-out;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .footer {
    text-align: center;
    margin-top: 24px;
    color: rgba(255, 255, 255, .2);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🦞</div>
      <h1>OpenClaw</h1>
      <p>Please sign in to continue</p>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="btn">
        <span class="btn-text">Sign In</span>
        <span class="spinner"></span>
      </button>
      <div class="error" id="error"></div>
    </form>

    <div class="footer">Secured by Nginx &middot; Cookie-based session</div>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;

  if (!user || !pass) return;

  btn.classList.add('loading');
  btn.disabled = true;
  err.style.display = 'none';

  try {
    const resp = await fetch('/auth/verify', {
      method: 'GET',
      headers: { 'Authorization': 'Basic ' + btoa(user + ':' + pass) },
      credentials: 'same-origin'
    });

    if (resp.ok) {
      const data = await resp.json();
      // Redirect with gateway token so Control UI auto-authenticates
      window.location.href = '/#token=' + data.token;
    } else {
      throw new Error('Invalid credentials');
    }
  } catch {
    err.textContent = 'Wrong username or password';
    err.style.display = 'block';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});
</script>
</body>
</html>

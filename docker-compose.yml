services:
  nginx:
    build: .
    image: ${NGINX_IMAGE:-openclaw-nginx:local}
    container_name: openclaw-nginx
    ports:
      - "${OPENCLAW_PORT:-18789}:80"
    environment:
      SESSION_SECRET: ${SESSION_SECRET}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      openclaw-gateway:
        condition: service_healthy
      openclaw-channels:
        condition: service_healthy
    restart: unless-stopped

  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
    volumes:
      - ./data/config:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
    depends_on:
      openclaw-admin:
        condition: service_healthy
    init: true
    restart: unless-stopped
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-admin:
    image: node:22-alpine
    container_name: openclaw-admin
    working_dir: /app
    volumes:
      - ./admin:/app:ro
      - ./data/config:/config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GATEWAY_CONTAINER: openclaw-gateway
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    command: ["node", "server.js"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3456/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  openclaw-channels:
    image: node:22-alpine
    container_name: openclaw-channels
    working_dir: /srv
    volumes:
      - ./channels:/src:ro
      - channels_modules:/srv/node_modules
      - ./data/config:/config
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
    command: ["sh", "-c", "cp /src/package.json /srv/ && cp /src/server.js /srv/ && npm install --omit=dev --no-fund --no-audit 2>&1 && node server.js"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3457/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    cap_drop: [NET_RAW, NET_ADMIN]
    security_opt: ["no-new-privileges:true"]
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      BROWSER: echo
    volumes:
      - ./data/config:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    profiles: [cli]

volumes:
  channels_modules:
